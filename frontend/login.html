<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS - Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-slate-800 text-center mb-2">Punto de venta de Connie</h1>
    <p class="text-slate-600 text-center text-sm mb-6">Inicia sesión para continuar</p>

    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de usuario</label>
        <input type="text" name="usuario" required placeholder="Usuario"
          class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
          autocomplete="username">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input type="password" name="password" required placeholder="Contraseña"
          class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
          autocomplete="current-password">
      </div>
      <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700 font-medium">
        Entrar
      </button>
    </form>

  </div>

  <script src="js/api.js"></script>
  <script>
    (function () {
      if (sessionStorage.getItem('loggedIn')) {
        location.href = 'index.html';
        return;
      }
      document.getElementById('form-login').onsubmit = async (e) => {
        e.preventDefault();
        const form = e.target;
        const usuario = form.usuario.value.trim();
        const password = form.password.value;
        try {
          const res = await api.auth.login({ usuario, password });
          sessionStorage.setItem('loggedIn', 'true');
          sessionStorage.setItem('usuario', res.usuario || usuario);
          location.href = 'index.html';
        } catch (err) {
          Swal.fire({ title: 'Error', text: err.message, icon: 'error' });
        }
      };
    })();
  </script>
</body>
</html>
