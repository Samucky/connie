<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS - Registrar venta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-slate-100 min-h-screen">
  <nav class="bg-emerald-700 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-2">
      <span id="nav-saludo" class="font-bold text-xl">Buenos días</span>
      <div class="flex gap-4 items-center">
        <a href="index.html" class="hover:bg-emerald-600 px-3 py-1 rounded">Dashboard</a>
        <a href="ventas.html" class="hover:bg-emerald-600 px-3 py-1 rounded">Ventas</a>
        <a href="inventario.html" class="hover:bg-emerald-600 px-3 py-1 rounded">Inventario</a>
        <a href="deudores.html" class="hover:bg-emerald-600 px-3 py-1 rounded">Deudores</a>
        <a href="pagos.html" class="hover:bg-emerald-600 px-3 py-1 rounded">Pagos</a>
        <a href="#" id="btn-cerrar-sesion" class="hover:bg-emerald-600 px-3 py-1 rounded text-sm opacity-90">Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Registrar venta</h1>

    <form id="form-venta" class="bg-white rounded-xl shadow border border-slate-200 p-6 space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de venta</label>
        <select name="tipo_venta" required class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
          <option value="contado">Contado</option>
          <option value="fiado">Fiado</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del cliente</label>
        <input type="text" name="nombre_cliente" required placeholder="Ej. Juan Pérez"
          class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-slate-700">Productos</label>
          <button type="button" id="btn-agregar" class="text-emerald-600 hover:underline font-medium text-sm">+ Agregar producto</button>
        </div>
        <div id="lista-productos" class="space-y-3">
          <div class="producto-row flex gap-2 items-end flex-wrap">
            <div class="flex-1 min-w-[140px]">
              <select name="producto_0" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="">Seleccionar...</option>
              </select>
            </div>
            <div class="w-20">
              <input type="number" name="cantidad_0" min="1" value="1" placeholder="Cant"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            </div>
            <button type="button" class="quitar-producto text-red-600 hover:underline text-sm hidden">Quitar</button>
          </div>
        </div>
      </div>

      <div class="border-t border-slate-200 pt-4 flex justify-between items-center">
        <span class="text-lg font-semibold text-slate-700">Total:</span>
        <span id="total-venta" class="text-2xl font-bold text-emerald-600">$0.00</span>
      </div>

      <div class="flex gap-4">
        <button type="submit" class="bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 font-medium">
          Registrar venta
        </button>
        <a href="index.html" class="bg-slate-200 text-slate-700 px-6 py-2 rounded-lg hover:bg-slate-300 font-medium">Cancelar</a>
      </div>
    </form>

    <div id="mensaje" class="mt-4 hidden rounded-lg p-4"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      if (!requireAuth()) return;
      document.getElementById('nav-saludo').textContent = getSaludo();
      document.getElementById('btn-cerrar-sesion').onclick = function (e) { e.preventDefault(); cerrarSesion(); };
      const form = document.getElementById('form-venta');
      const listaProductos = document.getElementById('lista-productos');
      const btnAgregar = document.getElementById('btn-agregar');
      const totalEl = document.getElementById('total-venta');
      const mensajeEl = document.getElementById('mensaje');
      let productos = [];
      let contador = 0;

      function showMsg(text, isError) {
        if (isError) Swal.fire({ title: 'Error', text: text, icon: 'error' });
      }

      function renderSelectOptions(select) {
        const current = select.value;
        select.innerHTML = '<option value="">Seleccionar...</option>' +
          productos.map(p => `<option value="${p.id}" data-precio="${p.precio_unitario}" data-nombre="${escapeHtml(p.nombre)}">${escapeHtml(p.nombre)} ($${p.precio_unitario.toFixed(2)}) - Stock: ${p.cantidad_disponible}</option>`);
        if (current) select.value = current;
      }

      function addRow() {
        contador++;
        const row = document.createElement('div');
        row.className = 'producto-row flex gap-2 items-end flex-wrap';
        row.innerHTML = `
          <div class="flex-1 min-w-[140px]">
            <select name="producto_${contador}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
              <option value="">Seleccionar...</option>
              ${productos.map(p => `<option value="${p.id}" data-precio="${p.precio_unitario}" data-nombre="${escapeHtml(p.nombre)}">${escapeHtml(p.nombre)} ($${p.precio_unitario.toFixed(2)}) - Stock: ${p.cantidad_disponible}</option>`).join('')}
            </select>
          </div>
          <div class="w-20">
            <input type="number" name="cantidad_${contador}" min="1" value="1" placeholder="Cant" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
          </div>
          <button type="button" class="quitar-producto text-red-600 hover:underline text-sm">Quitar</button>
        `;
        row.querySelector('.quitar-producto').onclick = () => { row.remove(); calcTotal(); };
        listaProductos.appendChild(row);
        row.querySelectorAll('select, input').forEach(el => el.addEventListener('change', calcTotal));
      }

      function calcTotal() {
        let total = 0;
        listaProductos.querySelectorAll('.producto-row').forEach(row => {
          const select = row.querySelector('select[name^="producto_"]');
          const input = row.querySelector('input[name^="cantidad_"]');
          if (select && select.value && input) {
            const precio = parseFloat(select.selectedOptions[0]?.dataset.precio || 0);
            const cant = parseInt(input.value, 10) || 0;
            total += precio * cant;
          }
        });
        totalEl.textContent = '$' + total.toFixed(2);
      }

      function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      btnAgregar.onclick = addRow;

      listaProductos.querySelectorAll('select, input').forEach(el => el.addEventListener('change', calcTotal));
      listaProductos.querySelector('.quitar-producto').onclick = function () {
        if (listaProductos.querySelectorAll('.producto-row').length > 1) {
          this.closest('.producto-row').remove();
          calcTotal();
        }
      };

      api.inventario.list().then(data => {
        productos = data;
        renderSelectOptions(listaProductos.querySelector('select[name="producto_0"]'));
        calcTotal();
      }).catch(e => showMsg(e.message, true));

      form.onsubmit = async (e) => {
        e.preventDefault();
        const tipo_venta = form.tipo_venta.value;
        const nombre_cliente = form.nombre_cliente.value.trim();
        const items = [];
        listaProductos.querySelectorAll('.producto-row').forEach(row => {
          const select = row.querySelector('select[name^="producto_"]');
          const input = row.querySelector('input[name^="cantidad_"]');
          if (select && select.value && input && (parseInt(input.value, 10) || 0) > 0) {
            items.push({ id_producto: select.value, cantidad: parseInt(input.value, 10) });
          }
        });
        if (items.length === 0) {
          showMsg('Agrega al menos un producto con cantidad mayor a 0.', true);
          return;
        }
        try {
          await api.ventas.create({ tipo_venta, nombre_cliente, productos: items });
          form.reset();
          document.querySelectorAll('.producto-row').forEach((r, i) => {
            if (i > 0) r.remove();
          });
          contador = 0;
          const first = listaProductos.querySelector('.producto-row');
          if (first) {
            first.querySelector('input[name^="cantidad_"]').value = 1;
            renderSelectOptions(first.querySelector('select'));
          }
          calcTotal();
          await Swal.fire({
            icon: 'success',
            title: '¡Venta registrada!',
            text: 'Se ha registrado correctamente.',
            confirmButtonText: 'Aceptar',
            confirmButtonColor: '#059669',
          });
          location.href = 'index.html';
        } catch (err) {
          showMsg(err.message, true);
        }
      };
    })();
  </script>
</body>
</html>
