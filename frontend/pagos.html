<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS - Registrar pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-slate-100 min-h-screen">
  <nav class="main-nav text-white">
    <div class="max-w-6xl mx-auto px-4 py-3 nav-wrap">
      <span id="nav-saludo" class="font-bold text-lg md:text-xl">Buenos días</span>
      <button type="button" class="nav-toggle" aria-label="Abrir menú" id="btn-nav-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html" class="hover:bg-emerald-600">Dashboard</a>
        <a href="ventas.html" class="hover:bg-emerald-600">Ventas</a>
        <a href="inventario.html" class="hover:bg-emerald-600">Inventario</a>
        <a href="deudores.html" class="hover:bg-emerald-600">Deudores</a>
        <a href="pagos.html" class="hover:bg-emerald-600">Pagos</a>
        <a href="#" id="btn-cerrar-sesion" class="hover:bg-emerald-600 text-sm opacity-90">Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Registrar pago</h1>

    <form id="form-pago" class="bg-white rounded-xl shadow border border-slate-200 p-6 space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Deudor</label>
        <select name="id_deudor" required class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
          <option value="">Seleccionar deudor...</option>
        </select>
        <p id="deuda-actual" class="mt-1 text-sm text-slate-600"></p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Monto a pagar</label>
        <input type="number" name="monto_pagado" step="0.01" min="0.01" required placeholder="0.00"
          class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Método de pago</label>
        <select name="metodo_pago" class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
          <option value="">Seleccionar...</option>
          <option value="Efectivo">Efectivo</option>
          <option value="Transferencia">Transferencia</option>
        </select>
      </div>
      <div class="flex gap-4 form-actions flex-wrap">
        <button type="submit" class="bg-emerald-600 text-white px-6 py-3 rounded-lg hover:bg-emerald-700 font-medium min-h-[44px] flex-1 min-w-[140px]">
          Registrar pago
        </button>
        <a href="index.html" class="bg-slate-200 text-slate-700 px-6 py-3 rounded-lg hover:bg-slate-300 font-medium min-h-[44px] flex items-center justify-center">Cancelar</a>
      </div>
    </form>

    <div id="mensaje" class="mt-4 hidden rounded-lg p-4"></div>

    <div class="mt-6 sm:mt-8 bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
      <h2 class="px-4 sm:px-6 py-4 border-b border-slate-200 text-lg font-semibold text-slate-800">Historial de pagos</h2>
      <div class="table-wrap">
        <table class="table-responsive w-full text-left">
          <thead class="bg-slate-50 text-slate-600 text-sm">
            <tr>
              <th class="px-6 py-3 font-medium">Deudor</th>
              <th class="px-6 py-3 font-medium">Monto</th>
              <th class="px-6 py-3 font-medium">Fecha</th>
              <th class="px-6 py-3 font-medium">Método</th>
            </tr>
          </thead>
          <tbody id="tabla-pagos" class="divide-y divide-slate-100">
            <tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('btn-nav-toggle')?.addEventListener('click', function() {
      document.getElementById('nav-menu')?.classList.toggle('is-open');
    });
    document.querySelectorAll('#nav-menu a').forEach(function(a) {
      a.addEventListener('click', function() { document.getElementById('nav-menu')?.classList.remove('is-open'); });
    });
    (function () {
      if (!requireAuth()) return;
      document.getElementById('nav-saludo').textContent = getSaludo();
      document.getElementById('btn-cerrar-sesion').onclick = function (e) { e.preventDefault(); cerrarSesion(); };
      const form = document.getElementById('form-pago');
      const selectDeudor = form.id_deudor;
      const deudaActual = document.getElementById('deuda-actual');
      const mensajeEl = document.getElementById('mensaje');
      const tablaPagos = document.getElementById('tabla-pagos');

      const params = new URLSearchParams(location.search);
      const deudorPreseleccionado = params.get('deudor');

      function showMsg(text, isError) {
        if (isError) Swal.fire({ title: 'Error', text: text, icon: 'error' });
        else Swal.fire({ title: '¡Listo!', text: text, icon: 'success', confirmButtonColor: '#059669' });
      }

      function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
      function formatDate(iso) { if (!iso) return '-'; return new Date(iso).toLocaleDateString('es'); }

      function actualizarDeuda() {
        const id = selectDeudor.value;
        if (!id) {
          deudaActual.textContent = '';
          return;
        }
        const opt = selectDeudor.selectedOptions[0];
        const deuda = opt ? parseFloat(opt.dataset.deuda || 0) : 0;
        deudaActual.textContent = 'Deuda actual: $' + deuda.toFixed(2);
      }

      function loadDeudores() {
        api.deudores.list().then(deudores => {
          const conDeuda = deudores.filter(d => (d.total_deuda || 0) > 0);
          selectDeudor.innerHTML = '<option value="">Seleccionar deudor...</option>' +
            conDeuda.map(d => `<option value="${d.id}" data-deuda="${d.total_deuda || 0}" data-nombre="${escapeHtml(d.nombre)}">${escapeHtml(d.nombre)} - $${(d.total_deuda || 0).toFixed(2)}</option>`).join('');
          if (deudorPreseleccionado) {
            selectDeudor.value = deudorPreseleccionado;
          }
          actualizarDeuda();
        }).catch(e => {
          selectDeudor.innerHTML = '<option value="">Error al cargar</option>';
        });
      }

      selectDeudor.addEventListener('change', actualizarDeuda);

      function loadPagos() {
        api.pagos.list().then(pagos => {
          if (pagos.length === 0) {
            tablaPagos.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">No hay pagos registrados.</td></tr>';
            return;
          }
          tablaPagos.innerHTML = pagos.slice().reverse().map(p => `
            <tr class="hover:bg-slate-50">
              <td data-label="Deudor" class="px-6 py-3 font-medium text-slate-800">${escapeHtml(p.nombre_deudor || '-')}</td>
              <td data-label="Monto" class="px-6 py-3 text-emerald-600 font-semibold">$${(p.monto_pagado || 0).toFixed(2)}</td>
              <td data-label="Fecha" class="px-6 py-3 text-slate-600">${formatDate(p.fecha)}</td>
              <td data-label="Método" class="px-6 py-3 text-slate-600">${escapeHtml(p.metodo_pago || '-')}</td>
            </tr>
          `).join('');
        }).catch(e => {
          tablaPagos.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-red-600">' + escapeHtml(e.message) + '</td></tr>';
          Swal.fire({ title: 'Error', text: e.message, icon: 'error' });
        });
      }

      form.onsubmit = async (e) => {
        e.preventDefault();
        const id_deudor = form.id_deudor.value;
        const monto_pagado = parseFloat(form.monto_pagado.value);
        const metodo_pago = form.metodo_pago.value.trim() || undefined;
        const nombre_deudor = selectDeudor.selectedOptions[0]?.dataset.nombre;
        if (!id_deudor || monto_pagado <= 0) {
          showMsg('Selecciona un deudor e ingresa un monto mayor a 0.', true);
          return;
        }
        try {
          await api.pagos.create({ id_deudor, nombre_deudor, monto_pagado, metodo_pago });
          await Swal.fire({
            icon: 'success',
            title: '¡Pago registrado!',
            text: 'Se ha registrado correctamente.',
            confirmButtonText: 'Aceptar',
            confirmButtonColor: '#059669',
          });
          location.href = 'index.html';
        } catch (err) {
          showMsg(err.message, true);
        }
      };

      loadDeudores();
      loadPagos();
    })();
  </script>
</body>
</html>
